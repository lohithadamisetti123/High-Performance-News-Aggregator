services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=4173
    ports:
      - "4173:4173"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4173"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
